function renderSprite(ctx,spriteData,palette,x,y,scale,flipH){
  if(scale===undefined)scale=2;if(flipH===undefined)flipH=false;
  const h=spriteData.length,w=spriteData[0].length;
  ctx.save();
  if(flipH){ctx.translate(x+w*scale,y);ctx.scale(-1,1);x=0;y=0;}
  for(let row=0;row<h;row++)for(let col=0;col<w;col++){
    const idx=spriteData[row][col];if(idx===0)continue;
    const color=palette[idx];if(!color||color==='transparent')continue;
    ctx.fillStyle=color;ctx.fillRect(x+col*scale,y+row*scale,scale,scale);
  }
  ctx.restore();
}
function renderTile(ctx,tileData,palette,x,y,scale){
  if(scale===undefined)scale=2;
  for(let row=0;row<tileData.length;row++)for(let col=0;col<tileData[row].length;col++){
    const idx=tileData[row][col];if(idx===0)continue;
    const color=palette[idx];if(!color||color==='transparent')continue;
    ctx.fillStyle=color;ctx.fillRect(x+col*scale,y+row*scale,scale,scale);
  }
}
function fillTiles(ctx,tileData,palette,x,y,width,height,scale){
  if(scale===undefined)scale=2;
  const tw=tileData[0].length*scale,th=tileData.length*scale;
  for(let ty=y;ty<y+height;ty+=th)for(let tx=x;tx<x+width;tx+=tw)renderTile(ctx,tileData,palette,tx,ty,scale);
}
function getAnimFrame(frames,time,fps){
  if(fps===undefined)fps=4;if(!frames||frames.length===0)return null;
  return frames[Math.floor(time/(1000/fps))%frames.length];
}

const FPS=60,FRAME=1/FPS,GAME_TIME=5*60,TOTAL_SLICES=8;
const DAD_REACH_FRAMES=25,DAD_EAT_FRAMES=90,DAD_BLOCKED_FRAMES=90,DAD_COOLDOWN_FRAMES=48;
const STAMINA_MAX=100,STAMINA_DRAIN_RATE=2,STAMINA_RECHARGE_RATE=1,STAMINA_EXHAUSTED_THRESHOLD=20;
const RATINGS=[{min:0,max:1,label:"Salad Eater..."},{min:2,max:3,label:"Amateur Taxer"},{min:4,max:5,label:"Sneaky Dad"},{min:6,max:7,label:"Master Taxer!"},{min:8,max:8,label:"TAX KING!!"}];

function rng(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function rngf(min,max){return Math.random()*(max-min)+min;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function createParticle(x,y,type){
  const base={x,y,age:0,maxAge:30,alpha:1};
  switch(type){
    case"crumb":return{...base,vx:rngf(-3,3),vy:rngf(-5,-1),gravity:0.18,size:rng(3,7),color:["#F4A460","#DAA520","#CD853F","#D2691E"][rng(0,3)],maxAge:rng(25,45),type:"crumb"};
    case"star":return{...base,vx:rngf(-4,4),vy:rngf(-4,4),gravity:0,size:rng(5,10),color:"#FFD700",maxAge:rng(15,25),type:"star",rotation:rngf(0,Math.PI*2),rotSpeed:rngf(-0.2,0.2)};
    case"heart":return{...base,vx:rngf(-1,1),vy:rngf(-2,-0.5),gravity:-0.02,size:rng(8,14),color:"#FF6B6B",maxAge:rng(30,50),type:"heart"};
    default:return base;
  }
}
function updateParticle(p){p.age++;p.x+=p.vx;p.y+=p.vy;p.vy+=(p.gravity||0);if(p.rotSpeed)p.rotation+=p.rotSpeed;p.alpha=clamp(1-p.age/p.maxAge,0,1);return p.age<p.maxAge;}
function createPopup(x,y,text,color,size){return{x,y,text,color:color||"#FFF",size:size||16,age:0,maxAge:55,vy:-1.2,alpha:1,scale:0};}
function updatePopup(p){p.age++;p.y+=p.vy;p.vy*=0.97;if(p.age<8)p.scale=Math.min(1.3,p.age/6);else if(p.age<14)p.scale=1.3-(p.age-8)*0.05;else p.scale=1;if(p.age>p.maxAge-15)p.alpha=clamp((p.maxAge-p.age)/15,0,1);return p.age<p.maxAge;}

function createBoy(name,side){
  return{name,side,state:"idle",slices:4,stamina:STAMINA_MAX,staminaExhausted:false,
    blockTimer:0,indicator:"",bobPhase:rngf(0,Math.PI*2),
    // AI state
    aiState:"idle",aiTimer:0,alertness:0.3,personality:name==="Bro 2"?"cautious":"aggressive"};
}

function updateBoyPlayer(boy,isBlocking){
  boy.bobPhase+=0.05;
  if(boy.staminaExhausted){
    boy.state="idle";boy.indicator="";
    boy.stamina=Math.min(STAMINA_MAX,boy.stamina+STAMINA_RECHARGE_RATE);
    if(boy.stamina>=STAMINA_EXHAUSTED_THRESHOLD)boy.staminaExhausted=false;
    return;
  }
  if(isBlocking&&boy.stamina>0){
    boy.state="blocking";boy.indicator="!";
    boy.stamina=Math.max(0,boy.stamina-STAMINA_DRAIN_RATE);
    if(boy.stamina<=0){boy.staminaExhausted=true;boy.state="idle";boy.indicator="";}
  }else{
    boy.state="idle";boy.indicator="";
    boy.stamina=Math.min(STAMINA_MAX,boy.stamina+STAMINA_RECHARGE_RATE);
  }
}

// BOY AI (for 1-player mode)
// ============================================================
function updateBoyAI(boy, dad, frameCount) {
  boy.bobPhase += 0.05;

  // Stamina recovery when exhausted
  if (boy.staminaExhausted) {
    boy.state = "idle"; boy.indicator = "";
    boy.stamina = Math.min(STAMINA_MAX, boy.stamina + STAMINA_RECHARGE_RATE);
    if (boy.stamina >= STAMINA_EXHAUSTED_THRESHOLD) boy.staminaExhausted = false;
    boy.aiState = "idle";
    return;
  }

  const iAmTarget = (boy.side === "left" && dad.target === "left") || (boy.side === "right" && dad.target === "right");
  const dadReaching = dad.state === "reaching" && iAmTarget;
  const dadEating = dad.state === "eating" && iAmTarget;

  // Personality-based parameters
  const isCautious = boy.personality === "cautious";
  // Base reaction chance per frame, escalates with alertness
  const reactChance = isCautious ? 0.04 : 0.06;
  // How quickly alertness rises after a steal
  const alertGrowth = isCautious ? 0.08 : 0.12;
  // Chance to randomly block (fidgety/paranoid)
  const paranoidChance = boy.alertness * (isCautious ? 0.003 : 0.005);
  // How long AI holds block (in frames)
  const blockDuration = isCautious ? rng(40, 80) : rng(30, 60);

  switch (boy.aiState) {
    case "idle":
      // Watch for dad reaching toward us
      if (dadReaching) {
        // Reaction chance increases with alertness and dad's reach progress
        const reactionRoll = Math.random();
        const threshold = reactChance + boy.alertness * 0.15 + dad.reachProgress * 0.3;
        if (reactionRoll < threshold) {
          boy.aiState = "blocking";
          boy.aiTimer = blockDuration;
          boy.state = "blocking";
          boy.indicator = "!";
          break;
        }
      }

      // Random paranoid block
      if (Math.random() < paranoidChance) {
        boy.aiState = "blocking";
        boy.aiTimer = rng(20, 50);
        boy.state = "blocking";
        boy.indicator = "!";
        break;
      }

      // Random distraction
      if (Math.random() < 0.002) {
        boy.aiState = "distracted";
        boy.aiTimer = rng(60, 180);
        boy.state = "distracted";
        boy.indicator = "";
      }

      boy.state = "idle";
      boy.indicator = "";
      boy.stamina = Math.min(STAMINA_MAX, boy.stamina + STAMINA_RECHARGE_RATE);
      break;

    case "blocking":
      boy.aiTimer--;
      boy.state = "blocking";
      boy.indicator = "!";
      boy.stamina = Math.max(0, boy.stamina - STAMINA_DRAIN_RATE);
      if (boy.stamina <= 0) {
        boy.staminaExhausted = true;
        boy.aiState = "idle";
        boy.state = "idle";
        boy.indicator = "";
      }
      if (boy.aiTimer <= 0) {
        boy.aiState = "idle";
        boy.state = "idle";
        boy.indicator = "";
      }
      break;

    case "distracted":
      boy.aiTimer--;
      boy.state = "distracted";
      boy.indicator = "";
      boy.stamina = Math.min(STAMINA_MAX, boy.stamina + STAMINA_RECHARGE_RATE);
      // Can snap out of distraction if dad is reaching for us
      if (dadReaching && Math.random() < (reactChance + boy.alertness * 0.1)) {
        boy.aiState = "blocking";
        boy.aiTimer = blockDuration;
        boy.state = "blocking";
        boy.indicator = "!";
        break;
      }
      if (boy.aiTimer <= 0) {
        boy.aiState = "idle";
      }
      break;
  }

  // Increase alertness when dad successfully steals (checked externally)
}

function createDad(){return{state:"idle",stateTimer:0,target:null,reachProgress:0,bobPhase:0};}
function updateDad(dad,input,boys,particles,popups,taxMeter,audioCallback,gameMode){
  dad.bobPhase+=0.04;
  switch(dad.state){
    case"idle":if(input.left)startReach(dad,"left");else if(input.right)startReach(dad,"right");break;
    case"reaching":
      dad.stateTimer--;dad.reachProgress=1-dad.stateTimer/DAD_REACH_FRAMES;
      if(dad.stateTimer<=0){
        const targetBoy=dad.target==="left"?boys[0]:boys[1];
        if(targetBoy.state==="blocking"){
          dad.state="blocked";dad.stateTimer=DAD_BLOCKED_FRAMES;dad.reachProgress=1;audioCallback("blocked");
          const px=dad.target==="left"?240:560;for(let i=0;i<6;i++)particles.push(createParticle(px,200,"star"));
          popups.push(createPopup(px,160,"BLOCKED!","#FF4444",28));
        }else if(targetBoy.slices<=0){
          dad.state="blocked";dad.stateTimer=DAD_BLOCKED_FRAMES;popups.push(createPopup(dad.target==="left"?240:560,160,"NO PIZZA!","#888",22));audioCallback("blocked");
        }else{
          targetBoy.slices--;const sliceType=dad.target==="left"?"cheese":"sausage";taxMeter.total++;taxMeter.slices.push(sliceType);
          dad.state="eating";dad.stateTimer=DAD_EAT_FRAMES;dad.reachProgress=1;audioCallback("grab");setTimeout(()=>audioCallback("eat"),300);
          const px=dad.target==="left"?280:520;for(let i=0;i<8;i++)particles.push(createParticle(px,240,"crumb"));
          const label=sliceType==="cheese"?"CHEESE!":"SAUSAGE!";popups.push(createPopup(400,140,"DAD TAX!","#FFD700",32));popups.push(createPopup(px,200,label,"#FFA500",22));
          // Increase AI alertness on steal
          if(gameMode==="1P"){
            targetBoy.alertness=Math.min(1,targetBoy.alertness+0.12);
            const otherBoy=dad.target==="left"?boys[1]:boys[0];
            otherBoy.alertness=Math.min(1,otherBoy.alertness+0.06);
          }
        }
      }break;
    case"eating":dad.stateTimer--;dad.reachProgress=Math.max(0,dad.reachProgress-0.02);if(dad.stateTimer<=0){dad.state="cooldown";dad.stateTimer=DAD_COOLDOWN_FRAMES;dad.reachProgress=0;}break;

const GameEngine=(function(){

  }

    dad=createDad();boys=[createBoy("Bro 2","left"),createBoy("Bro 1","right")];particles=[];popups=[];taxMeter={total:0,slices:[]};inputState={left:false,right:false};boyInputState={parkerBlocking:false,brennanBlocking:false};frameCount=0;timer=GAME_TIME;lastRating="";gameOverReason="";gameState="PLAYING";AudioEngine.playMusic();

})();

const AudioEngine=(function(){
  let ctx=null,masterGain=null,musicPlaying=false,musicInterval=null;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=0.35;masterGain.connect(ctx.destination);}

  const N={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,Bb3:233.08,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,R:0};
  const TEMPO=160,EIGHTH=60/TEMPO/2;
  const melodyA=[N.A4,N.B4,N.C5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.C5,N.D5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.A4,N.R,N.A4,N.C5,N.D5,N.E5,N.G5,N.E5,N.D5,N.C5,N.D5,N.E5,N.C5,N.B4,N.A4,N.B4,N.C5,N.D5,N.C5,N.B4,N.A4,N.G4,N.F4,N.E4,N.A4,N.R,N.A4];
  const melodyB=[N.C5,N.E5,N.G5,N.E5,N.C5,N.E5,N.D5,N.F5,N.A5,N.F5,N.D5,N.F5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.C5,N.D5,N.E5,N.D5,N.C5,N.C5,N.E5,N.E5,N.G5,N.G5,N.A5,N.G5,N.E5,N.C5,N.D5,N.E5,N.F5,N.E5,N.D5,N.C5,N.B4,N.A4,N.A4,N.C5,N.E5,N.A4,N.R,N.R];
  const fullMelody=melodyA.concat(melodyB);
  const bassPattern=[N.A3,N.E3,N.A3,N.E3,N.D3,N.A3,N.G3,N.E3,N.A3,N.E3,N.C4,N.G3,N.D3,N.E3,N.A3,N.A3,N.C3,N.G3,N.D3,N.A3,N.E3,N.G3,N.A3,N.E3,N.C3,N.E3,N.G3,N.C3,N.F3,N.E3,N.A3,N.A3];
  let melodyIndex=0,bassIndex=0,eigthCount=0;
  function scheduleMusic(){
    if(!ctx||!musicPlaying)return;const now=ctx.currentTime;const noteTime=EIGHTH;
    const mNote=fullMelody[melodyIndex%fullMelody.length];if(mNote>0)playTone(mNote,"square",noteTime*0.85,0.13,now);melodyIndex++;
    if(eigthCount%3===0){const bNote=bassPattern[bassIndex%bassPattern.length];if(bNote>0)playTone(bNote,"triangle",noteTime*3*0.9,0.18,now);bassIndex++;}
    const beatInBar=eigthCount%6;
    if(beatInBar===0)playTone(60,"triangle",0.08,0.2,now);else if(beatInBar===3)playTone(55,"triangle",0.06,0.15,now);
    if(beatInBar===0||beatInBar===2||beatInBar===3||beatInBar===5)playNoise(0.04,0.06,now);

      case"victory":playTone(523,"square",0.15,0.15,now);playTone(659,"square",0.15,0.15,now+0.15);playTone(784,"square",0.15,0.15,now+0.3);playTone(1047,"square",0.3,0.18,now+0.45);playTone(392,"triangle",0.15,0.1,now+0.15);playTone(523,"triangle",0.15,0.1,now+0.3);playTone(659,"triangle",0.3,0.12,now+0.45);for(let i=0;i<5;i++)playNoise(0.04,0.06,now+0.5+i*0.08);break;
    }
  }

})();

  c.fillStyle='#444';c.fillRect(wbX-2,wbY+15,4,1);c.fillRect(wbX-2,wbY+17,4,1);

  // Candle with flickering flame (between left plate and shakers)
  const cdX=220,cdY=TABLE_Y+18;
  // Candle holder base
  c.fillStyle='rgba(0,0,0,0.3)';c.beginPath();c.ellipse(cdX,cdY+18,8,2,0,0,Math.PI*2);c.fill();
  c.fillStyle='#aaaa44';c.beginPath();c.ellipse(cdX,cdY+16,7,2.5,0,0,Math.PI*2);c.fill();
  c.fillStyle='#ccbb55';c.fillRect(cdX-6,cdY+14,12,2);
  c.fillStyle='#888833';c.fillRect(cdX-2,cdY+8,4,8);
  // Candle wax (dripping)
  c.fillStyle='#f4ecc8';c.fillRect(cdX-2,cdY-4,4,12);
  c.fillStyle='#e8dcb0';c.fillRect(cdX+1,cdY-4,1,12);
  c.fillStyle='#d8c898';c.fillRect(cdX-3,cdY-1,1,9);
  // Drip
  c.fillStyle='#f4ecc8';c.beginPath();c.arc(cdX-2,cdY+2,1.5,0,Math.PI*2);c.fill();
  // Wick
  c.fillStyle='#1a1a1a';c.fillRect(cdX,cdY-6,1,3);
  // Flame (flickering)
  const flickerT=performance.now()*0.015;
  const fsz=1+Math.sin(flickerT)*0.2;
  const fsway=Math.sin(flickerT*0.7)*0.5;
  // Outer glow
  const flameGlow=c.createRadialGradient(cdX+fsway,cdY-9,1,cdX,cdY-9,14);
  flameGlow.addColorStop(0,'rgba(255,200,80,0.5)');
  flameGlow.addColorStop(1,'rgba(255,200,80,0)');
  c.fillStyle=flameGlow;c.fillRect(cdX-14,cdY-22,28,20);
  // Outer flame
  c.fillStyle='#ff8822';c.beginPath();c.ellipse(cdX+fsway,cdY-9,2.5*fsz,5*fsz,fsway*0.1,0,Math.PI*2);c.fill();
  // Mid flame
  c.fillStyle='#ffcc44';c.beginPath();c.ellipse(cdX+fsway*0.7,cdY-9,1.8*fsz,3.5*fsz,0,0,Math.PI*2);c.fill();
  // Core
  c.fillStyle='#fff4cc';c.beginPath();c.ellipse(cdX+fsway*0.5,cdY-8,1,2*fsz,0,0,Math.PI*2);c.fill();
}

// Canvas-drawn food (better looking than pixel sprites at this scale)
function drawPlate(cx,cy,r){
  // Plate shadow
  c.fillStyle='rgba(0,0,0,0.25)';c.beginPath();c.ellipse(cx+2,cy+3,r+1,r*0.7+1,0,0,Math.PI*2);c.fill();
  // Plate base
  c.fillStyle='#d0d0c4';c.beginPath();c.ellipse(cx,cy,r,r*0.7,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#a8a898';c.lineWidth=2;c.stroke();
  // Plate rim ring
  c.fillStyle='#e8e8dc';c.beginPath();c.ellipse(cx,cy-1,r-2,r*0.7-1.5,0,0,Math.PI*2);c.fill();
  // Inner plate
  c.fillStyle='#f4f4ec';c.beginPath();c.ellipse(cx,cy-1,r-5,r*0.7-4,0,0,Math.PI*2);c.fill();
  // Shine highlight
  c.fillStyle='rgba(255,255,255,0.7)';
  c.beginPath();c.ellipse(cx-r*0.4,cy-r*0.35,r*0.2,r*0.08,-0.3,0,Math.PI*2);c.fill();
}

function drawPizzaWhole(cx,cy,r,type){
  // Crust with radial gradient
  const crustGrad=c.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.3,cx,cy,r);
  crustGrad.addColorStop(0,'#e0a840');
  crustGrad.addColorStop(0.7,'#c8942a');
  crustGrad.addColorStop(1,'#8a5a20');
  c.fillStyle=crustGrad;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();
  c.strokeStyle='#6a3a10';c.lineWidth=2;c.stroke();
  // Crust bumps
  c.fillStyle='#daa540';
  for(let i=0;i<10;i++){const a=i*Math.PI*2/10;c.beginPath();c.arc(cx+Math.cos(a)*(r-2),cy+Math.sin(a)*(r-2),1.5,0,Math.PI*2);c.fill();}
  // Sauce layer
  const sauceGrad=c.createRadialGradient(cx-2,cy-2,2,cx,cy,r-4);
  sauceGrad.addColorStop(0,'#dd5a28');
  sauceGrad.addColorStop(1,'#a83010');
  c.fillStyle=sauceGrad;c.beginPath();c.arc(cx,cy,r-4,0,Math.PI*2);c.fill();
  // Cheese with gradient
  const cheeseGrad=c.createRadialGradient(cx-r*0.3,cy-r*0.3,2,cx,cy,r-5);
  cheeseGrad.addColorStop(0,'#fff0a0');
  cheeseGrad.addColorStop(0.7,'#f0c040');
  cheeseGrad.addColorStop(1,'#d8a020');
  c.fillStyle=cheeseGrad;c.beginPath();c.arc(cx,cy,r-6,0,Math.PI*2);c.fill();
  // Melted cheese bubbles / browning spots
  c.fillStyle='#ffe060';
  for(let i=0;i<6;i++){const a=i*1.05+0.3;const d=r*0.35;c.beginPath();c.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,2.5,0,Math.PI*2);c.fill();}
  c.fillStyle='#c88820';
  for(let i=0;i<4;i++){const a=i*1.6+0.8;const d=r*0.5;c.beginPath();c.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d,1.2,0,Math.PI*2);c.fill();}
  c.fillStyle='#ffffb0';
  c.beginPath();c.arc(cx-r*0.3,cy-r*0.3,r*0.15,0,Math.PI*2);c.fill();
  // Toppings
  if(type==='sausage'){
    const spots=[[0,-6],[-8,4],[7,3],[-3,-10],[5,-5],[-6,-3],[2,7],[-10,-2],[9,-8]];
    for(const[sx,sy] of spots){
      // Dark outer
      c.fillStyle='#4a2010';c.beginPath();c.arc(cx+sx,cy+sy,3.2,0,Math.PI*2);c.fill();
      // Mid tone
      c.fillStyle='#7a3a1a';c.beginPath();c.arc(cx+sx,cy+sy,2.6,0,Math.PI*2);c.fill();
      // Highlight
      c.fillStyle='#a85a2a';c.beginPath();c.arc(cx+sx-0.5,cy+sy-0.8,1.5,0,Math.PI*2);c.fill();
      c.fillStyle='#c8804a';c.beginPath();c.arc(cx+sx-0.8,cy+sy-1,0.6,0,Math.PI*2);c.fill();
    }
  }else{
    // Cheese pizza: basil flecks
    c.fillStyle='#2a7a2a';
    const basil=[[-5,-7],[6,-5],[-7,5],[4,8],[-2,2]];
    for(const[bx,by] of basil){c.beginPath();c.ellipse(cx+bx,cy+by,1.2,0.6,by*0.2,0,Math.PI*2);c.fill();}
  }
  // Slice lines
  c.strokeStyle='rgba(100,60,20,0.35)';c.lineWidth=1;
  for(let i=0;i<4;i++){const a=i*Math.PI/4;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+Math.cos(a)*(r-3),cy+Math.sin(a)*(r-3));c.stroke();}
}

function drawPizzaSlice(cx,cy,angle,type){
  c.save();c.translate(cx,cy);c.rotate(angle);
  // Slice shadow
  c.fillStyle='rgba(0,0,0,0.25)';
  c.beginPath();c.moveTo(1,-1);c.lineTo(-9,17);c.lineTo(9,17);c.closePath();c.fill();
  // Crust base
  c.fillStyle='#c8942a';c.beginPath();c.moveTo(0,-2);c.lineTo(-8,16);c.lineTo(8,16);c.closePath();c.fill();
  c.strokeStyle='#6a3a10';c.lineWidth=1;c.stroke();
  // Cheese
  const cheeseGrad=c.createLinearGradient(0,0,0,14);
  cheeseGrad.addColorStop(0,'#fff0a0');
  cheeseGrad.addColorStop(1,'#d8a020');
  c.fillStyle=cheeseGrad;c.beginPath();c.moveTo(0,0);c.lineTo(-6,14);c.lineTo(6,14);c.closePath();c.fill();
  // Crust arc (thick edge)
  c.fillStyle='#daa540';c.beginPath();c.ellipse(0,16,9,4,0,0,Math.PI);c.fill();
  c.strokeStyle='#6a3a10';c.lineWidth=1;c.beginPath();c.ellipse(0,16,9,4,0,0,Math.PI);c.stroke();
  c.fillStyle='#e8b850';c.beginPath();c.ellipse(0,16,7,2,0,Math.PI,Math.PI*2);c.fill();
  // Topping
  if(type==='sausage'){
    c.fillStyle='#4a2010';c.beginPath();c.arc(0,7,2.8,0,Math.PI*2);c.fill();
    c.fillStyle='#7a3a1a';c.beginPath();c.arc(0,7,2.2,0,Math.PI*2);c.fill();
    c.fillStyle='#a85a2a';c.beginPath();c.arc(-0.5,6.5,1.2,0,Math.PI*2);c.fill();
  }else{
    c.fillStyle='#2a7a2a';c.beginPath();c.ellipse(-1,8,1,0.5,0.3,0,Math.PI*2);c.fill();
  }
  c.restore();
}

// Heat steam wisps above fresh food
function drawSteam(cx,cy,time,count){
  c.save();
  for(let i=0;i<count;i++){
    const phase=time*0.0018+i*1.7;
    const sway=Math.sin(phase)*4;
    const rise=((time*0.06+i*50)%90);
    const alpha=0.35*(1-rise/90);
    c.strokeStyle=`rgba(240,240,240,${alpha})`;
    c.lineWidth=2;
    c.beginPath();
    const baseX=cx+(i-count/2)*5;
    for(let t=0;t<=1;t+=0.2){
      const x=baseX+Math.sin(phase+t*3)*sway;
      const y=cy-rise*t;
      if(t===0)c.moveTo(x,y);else c.lineTo(x,y);
    }
    c.stroke();
  }
  c.restore();
}

function drawCaesarSalad(cx,cy){
  // Bowl shadow
  c.fillStyle='rgba(0,0,0,0.3)';c.beginPath();c.ellipse(cx+2,cy+10,24,7,0,0,Math.PI*2);c.fill();
  // Bowl with gradient
  const bowlGrad=c.createLinearGradient(cx-22,cy,cx+22,cy+12);
  bowlGrad.addColorStop(0,'#6a4a20');
  bowlGrad.addColorStop(0.5,'#aa8040');
  bowlGrad.addColorStop(1,'#5a3a18');
  c.fillStyle=bowlGrad;c.beginPath();c.ellipse(cx,cy+6,22,14,0,0,Math.PI*2);c.fill();
  // Bowl rim
  c.fillStyle='#c89850';c.beginPath();c.ellipse(cx,cy+4,20,12,0,0,Math.PI*2);c.fill();
  c.fillStyle='#8a5a20';c.beginPath();c.ellipse(cx,cy+5,18,11,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#4a2a10';c.lineWidth=1.5;c.beginPath();c.ellipse(cx,cy+6,22,14,0,0,Math.PI);c.stroke();
  // Lettuce pile
  const greens=['#5a9a3a','#4a8a2a','#6aaa4a','#3a7a1a','#7aba5a'];
  for(let i=0;i<8;i++){
    const a=i*0.8+0.3;const d=8+Math.sin(i*2.1)*4;
    const lx=cx+Math.cos(a)*d*0.6;const ly=cy-2+Math.sin(a)*d*0.3-i*0.8;
    c.fillStyle=greens[i%greens.length];
    c.beginPath();c.ellipse(lx,ly,7+Math.sin(i)*2,4,a*0.3,0,Math.PI*2);c.fill();
  }
  // Romaine leaves sticking up
  c.fillStyle='#5aaa3a';
  c.beginPath();c.ellipse(cx-6,cy-10,3,7,0.3,0,Math.PI*2);c.fill();
  c.fillStyle='#4a9a2a';
  c.beginPath();c.ellipse(cx+5,cy-12,3,8,-0.2,0,Math.PI*2);c.fill();
  c.fillStyle='#6aba4a';
  c.beginPath();c.ellipse(cx,cy-9,4,6,0,0,Math.PI*2);c.fill();
  // Croutons
  c.fillStyle='#c8a040';
  c.fillRect(cx-8,cy-4,5,4);c.fillRect(cx+4,cy-6,5,4);c.fillRect(cx-2,cy-2,4,4);
  c.fillStyle='#dab050';
  c.fillRect(cx-7,cy-3,3,2);c.fillRect(cx+5,cy-5,3,2);
  // Parmesan shavings
  c.fillStyle='rgba(255,255,220,0.7)';
  c.fillRect(cx-5,cy-8,2,1);c.fillRect(cx+3,cy-10,3,1);c.fillRect(cx-1,cy-6,2,1);
  // Caesar dressing drizzle
  c.strokeStyle='rgba(240,230,180,0.5)';c.lineWidth=1;
  c.beginPath();c.moveTo(cx-10,cy-5);c.quadraticCurveTo(cx,cy-8,cx+10,cy-4);c.stroke();
  // Sad face on a crouton
  c.fillStyle='#222';
  c.fillRect(cx-4,cy-1,1,1);c.fillRect(cx,cy-1,1,1);
  c.beginPath();c.arc(cx-2,cy+2,2,Math.PI,0);c.stroke();
}

function drawFly(cx,cy,time){
  // Animated body
  c.fillStyle='#1a1a1a';c.beginPath();c.ellipse(cx,cy,2.2,1.4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#3a3a3a';c.beginPath();c.ellipse(cx-0.5,cy-0.3,1.2,0.7,0,0,Math.PI*2);c.fill();
  // Buzzing wings (alternate)
  const wingP=Math.sin(time*0.08);
  c.fillStyle='rgba(220,220,255,0.55)';
  c.beginPath();c.ellipse(cx-1,cy-1.5+wingP*0.5,2,1,-0.4,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(cx+1,cy-1.5-wingP*0.5,2,1,0.4,0,Math.PI*2);c.fill();
}

function renderTableItems(){
  const boys=GameEngine.getBoys();
  const t=performance.now();
  // Bro 2 plate + cheese pizza (left)
  drawPlate(144,TABLE_Y+42,24);
  if(boys[0].slices>0){
    if(boys[0].slices>=3){drawPizzaWhole(144,TABLE_Y+40,18,'cheese');drawSteam(144,TABLE_Y+20,t,3);}
    else for(let i=0;i<boys[0].slices;i++)drawPizzaSlice(130+i*14,TABLE_Y+34,i*0.4-0.2,'cheese');
  }
  // Bro 1 plate + sausage pizza (right)
  drawPlate(454,TABLE_Y+42,24);
  if(boys[1].slices>0){
    if(boys[1].slices>=3){drawPizzaWhole(454,TABLE_Y+40,18,'sausage');drawSteam(454,TABLE_Y+20,t,3);}
    else for(let i=0;i<boys[1].slices;i++)drawPizzaSlice(440+i*14,TABLE_Y+34,i*0.4-0.2,'sausage');
  }
  // Dad's caesar salad (center)

  // Buzzing fly flying around the table in a figure-8
  const flyT=t*0.002;
  const flyX=320+Math.sin(flyT)*120;
  const flyY=TABLE_Y+20+Math.sin(flyT*2)*12;
  drawFly(flyX,flyY,t);
}

function drawStretchyArm(startX,startY,endX,endY,progress,blocked){
  const curX=startX+(endX-startX)*progress;
  const curY=startY+(endY-startY)*progress;
  const wobble=Math.sin(performance.now()*0.012)*3*progress;
  const wobble2=Math.cos(performance.now()*0.009)*2*progress;
  const segments=Math.max(4,Math.floor(progress*14));
  for(let i=0;i<=segments;i++){
    const t=i/segments;
    const sx=startX+(curX-startX)*t;
    const sy=startY+(curY-startY)*t;
    const wave=Math.sin(t*Math.PI*3+performance.now()*0.008)*wobble;
    const px=sx+wave;
    const py=sy+wobble2*Math.sin(t*Math.PI);
    const thickness=8-t*2;
    c.fillStyle=(i%2===0)?'#dea96e':'#c68642';
    c.beginPath();c.ellipse(px,py,thickness,thickness*0.7,0,0,Math.PI*2);c.fill();
    c.strokeStyle='#6b4226';c.lineWidth=1;c.stroke();
    if(i<2){c.fillStyle='#2d7a2d';c.beginPath();c.ellipse(px,py,thickness+2,thickness*0.8,0,0,Math.PI*2);c.fill();}
  }
  const handX=curX+wobble*0.5;
  const handY=curY+wobble2*0.3;
  if(blocked){
    c.fillStyle='#dea96e';c.beginPath();c.ellipse(handX,handY,8,6,0.3,0,Math.PI*2);c.fill();
    c.strokeStyle='#6b4226';c.lineWidth=1;c.stroke();
    c.fillStyle='#ff4444';c.beginPath();c.arc(handX-3,handY-4,2,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(handX+4,handY-1,2,0,Math.PI*2);c.fill();
    const starT=performance.now()*0.005;
    for(let s=0;s<4;s++){const a=starT+s*Math.PI/2;const sx2=handX+Math.cos(a)*14;const sy2=handY+Math.sin(a)*12;drawTextShadow('*',sx2-4,sy2-4,'#FFD700','#000',12,'center');}
  }else{
    c.fillStyle='#dea96e';c.beginPath();c.ellipse(handX,handY,8,7,0,0,Math.PI*2);c.fill();
    c.strokeStyle='#6b4226';c.lineWidth=1;c.stroke();
    const fingerWiggle=Math.sin(performance.now()*0.015)*0.3;
    const fingers=[[-6,-7],[-2,-9],[3,-8],[6,-6],[7,0]];
    for(const[fx,fy] of fingers){c.fillStyle='#dea96e';c.beginPath();c.ellipse(handX+fx,handY+fy+fingerWiggle*fx,2.5,4,fx*0.1,0,Math.PI*2);c.fill();c.strokeStyle='#6b4226';c.lineWidth=0.8;c.stroke();}
    if(progress>=1){c.fillStyle='#f0c040';c.beginPath();c.moveTo(handX,handY-12);c.lineTo(handX-8,handY-2);c.lineTo(handX+8,handY-2);c.closePath();c.fill();c.strokeStyle='#aa7a30';c.lineWidth=1;c.stroke();}
  }
}

function drawDadChar(cx,cy,state,bobPhase,time){
  const bob=Math.sin(bobPhase)*2;
  cy+=bob;
  c.save();
  // Legs
  const legSpread=state==='blocked'?6:4;
  c.fillStyle='#2a2a4a';
  c.fillRect(cx-legSpread-5,cy+38,8,22);c.fillRect(cx+legSpread-3,cy+38,8,22);
  // Shoes
  c.fillStyle='#1a1a1a';
  c.fillRect(cx-legSpread-7,cy+58,12,5);c.fillRect(cx+legSpread-4,cy+58,12,5);
  // Body (green shirt)
  c.fillStyle='#2d7a2d';
  c.beginPath();c.moveTo(cx-16,cy+10);c.lineTo(cx-14,cy+40);c.lineTo(cx+14,cy+40);c.lineTo(cx+16,cy+10);c.closePath();c.fill();
  c.strokeStyle='#1a4a1a';c.lineWidth=1.5;c.stroke();
  // Shirt highlight
  c.fillStyle='#4a9a4a';
  c.beginPath();c.moveTo(cx-6,cy+12);c.lineTo(cx-4,cy+36);c.lineTo(cx+4,cy+36);c.lineTo(cx+6,cy+12);c.closePath();c.fill();
  // Belt
  c.fillStyle='#1a1a1a';c.fillRect(cx-14,cy+36,28,4);
  c.fillStyle='#daa520';c.fillRect(cx-3,cy+36,6,4);
  // Neck
  c.fillStyle='#c68642';c.fillRect(cx-4,cy+2,8,10);
  // Head
  c.fillStyle='#c68642';c.beginPath();c.ellipse(cx,cy-10,14,16,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#6b4226';c.lineWidth=1;c.stroke();
  // Hair (salt & pepper)
  c.fillStyle='#6e5a3a';
  c.beginPath();c.ellipse(cx,cy-22,13,8,0,Math.PI,Math.PI*2);c.fill();
  c.fillStyle='#8a7a5a';
  c.beginPath();c.ellipse(cx-5,cy-24,5,4,0.2,Math.PI,Math.PI*2);c.fill();
  c.fillStyle='#555';
  c.beginPath();c.ellipse(cx+5,cy-24,5,4,-0.2,Math.PI,Math.PI*2);c.fill();
  // Eyes
  const eyeY=cy-12;
  if(state==='eating'){
    // Happy squint
    c.strokeStyle='#1a1a1a';c.lineWidth=2;
    c.beginPath();c.arc(cx-6,eyeY,3,Math.PI*0.1,Math.PI*0.9);c.stroke();
    c.beginPath();c.arc(cx+6,eyeY,3,Math.PI*0.1,Math.PI*0.9);c.stroke();
  }else if(state==='blocked'){
    // X eyes
    c.strokeStyle='#ff4444';c.lineWidth=2;
    c.beginPath();c.moveTo(cx-8,eyeY-3);c.lineTo(cx-4,eyeY+3);c.moveTo(cx-4,eyeY-3);c.lineTo(cx-8,eyeY+3);c.stroke();
    c.beginPath();c.moveTo(cx+4,eyeY-3);c.lineTo(cx+8,eyeY+3);c.moveTo(cx+8,eyeY-3);c.lineTo(cx+4,eyeY+3);c.stroke();
  }else{
    // Normal eyes looking side to side
    const lookX=state==='reaching'?2:Math.sin(time*0.002)*2;
    c.fillStyle='#fff';c.beginPath();c.ellipse(cx-6,eyeY,4,4,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(cx+6,eyeY,4,4,0,0,Math.PI*2);c.fill();
    c.fillStyle='#1a1a1a';c.beginPath();c.arc(cx-6+lookX,eyeY,2,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+6+lookX,eyeY,2,0,Math.PI*2);c.fill();
  }
  // Eyebrows (bushy, dad)
  c.strokeStyle='#4a3a2a';c.lineWidth=2.5;c.lineCap='round';
  if(state==='blocked'){
    c.beginPath();c.moveTo(cx-10,eyeY-7);c.lineTo(cx-3,eyeY-4);c.stroke();
    c.beginPath();c.moveTo(cx+3,eyeY-4);c.lineTo(cx+10,eyeY-7);c.stroke();
  }else if(state==='reaching'||state==='eating'){
    // Furrowed/determined
    c.beginPath();c.moveTo(cx-10,eyeY-6);c.lineTo(cx-3,eyeY-3);c.stroke();
    c.beginPath();c.moveTo(cx+3,eyeY-3);c.lineTo(cx+10,eyeY-6);c.stroke();
  }else{
    c.beginPath();c.moveTo(cx-10,eyeY-5);c.lineTo(cx-3,eyeY-5);c.stroke();
    c.beginPath();c.moveTo(cx+3,eyeY-5);c.lineTo(cx+10,eyeY-5);c.stroke();
  }
  c.lineCap='butt';
  // Nose
  c.fillStyle='#b07030';c.beginPath();c.ellipse(cx,cy-6,3,4,0,0,Math.PI*2);c.fill();
  c.fillStyle='#c08040';c.beginPath();c.ellipse(cx-1,cy-7,1,1,0,0,Math.PI*2);c.fill();
  // Mouth/goatee
  c.fillStyle='#4a3a2a';c.beginPath();c.ellipse(cx,cy+1,5,3,0,0,Math.PI*2);c.fill();
  if(state==='eating'){
    c.fillStyle='#cc4444';c.beginPath();c.arc(cx,cy,4,0,Math.PI);c.fill();
  }else if(state==='blocked'){
    c.strokeStyle='#1a1a1a';c.lineWidth=1.5;c.beginPath();c.arc(cx,cy+4,4,Math.PI,0);c.stroke();
  }else{
    c.strokeStyle='#1a1a1a';c.lineWidth=1;c.beginPath();c.moveTo(cx-3,cy+1);c.lineTo(cx+3,cy+1);c.stroke();
  }
  // Arms at sides (when not reaching)
  if(state==='idle'||state==='cooldown'){
    c.fillStyle='#2d7a2d';
    c.fillRect(cx-20,cy+12,6,20);c.fillRect(cx+14,cy+12,6,20);
    c.fillStyle='#c68642';
    c.beginPath();c.ellipse(cx-17,cy+34,4,3,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+17,cy+34,4,3,0,0,Math.PI*2);c.fill();
  }
  c.restore();
}

function drawBoyChar(cx,cy,name,state,bobPhase,indicator,time){
  const bob=Math.sin(bobPhase)*2;
  // Ground shadow under boy
  drawCharShadow(cx,cy+54,16);
  cy+=bob;
  const isParker=name==='Bro 2';
  const shirtDark=isParker?'#1a3a7a':'#7a1a1a';
  const shirtBase=isParker?'#2a5aaa':'#aa2a2a';
  const shirtLight=isParker?'#4a7acc':'#cc4a4a';
  const hairDark=isParker?'#b89040':'#6e4a20';
  const hairLight=isParker?'#d4aa50':'#8a6a30';
  c.save();
  // Legs
  c.fillStyle='#2a2a4a';
  c.fillRect(cx-5,cy+32,7,18);c.fillRect(cx-1,cy+32,7,18);
  // Shoes
  c.fillStyle='#1a1a1a';
  c.fillRect(cx-6,cy+48,10,4);c.fillRect(cx-2,cy+48,10,4);
  // Body (jersey)
  c.fillStyle=shirtBase;
  c.beginPath();c.moveTo(cx-13,cy+8);c.lineTo(cx-11,cy+34);c.lineTo(cx+11,cy+34);c.lineTo(cx+13,cy+8);c.closePath();c.fill();
  c.strokeStyle=shirtDark;c.lineWidth=1;c.stroke();
  // Jersey number
  c.fillStyle='#fff';c.font='bold 10px monospace';c.textAlign='center';c.textBaseline='middle';
  c.fillText(isParker?'7':'11',cx,cy+22);
  // Shirt highlight stripe
  c.fillStyle=shirtLight;c.fillRect(cx-12,cy+14,24,3);
  // Neck
  c.fillStyle='#c68642';c.fillRect(cx-3,cy+1,6,9);
  // Head
  c.fillStyle='#c68642';c.beginPath();c.ellipse(cx,cy-10,12,13,0,0,Math.PI*2);c.fill();
  c.strokeStyle='#6b4226';c.lineWidth=1;c.stroke();
  // Hair
  c.fillStyle=hairDark;
  c.beginPath();c.ellipse(cx,cy-20,11,7,0,Math.PI,Math.PI*2);c.fill();
  c.fillStyle=hairLight;
  c.beginPath();c.ellipse(cx,cy-22,9,5,0,Math.PI,Math.PI*2);c.fill();
  // Side hair
  c.fillStyle=hairDark;
  c.fillRect(cx-12,cy-16,3,8);c.fillRect(cx+9,cy-16,3,8);
  // Eyes
  const eyeY=cy-11;
  if(state==='blocking'){
    // Determined squint
    c.strokeStyle='#1a1a1a';c.lineWidth=2;
    c.beginPath();c.moveTo(cx-9,eyeY-2);c.lineTo(cx-3,eyeY+1);c.stroke();
    c.beginPath();c.moveTo(cx+3,eyeY+1);c.lineTo(cx+9,eyeY-2);c.stroke();
  }else if(state==='distracted'){
    // Looking away dreamily
    c.fillStyle='#fff';c.beginPath();c.ellipse(cx-5,eyeY,3.5,3.5,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(cx+5,eyeY,3.5,3.5,0,0,Math.PI*2);c.fill();
    c.fillStyle='#1a1a1a';c.beginPath();c.arc(cx-5+(isParker?-2:2),eyeY-1,1.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+5+(isParker?-2:2),eyeY-1,1.5,0,Math.PI*2);c.fill();
  }else if(state==='eating'){
    // Happy
    c.strokeStyle='#1a1a1a';c.lineWidth=1.5;
    c.beginPath();c.arc(cx-5,eyeY,3,Math.PI*0.1,Math.PI*0.9);c.stroke();
    c.beginPath();c.arc(cx+5,eyeY,3,Math.PI*0.1,Math.PI*0.9);c.stroke();
  }else{
    // Normal
    const lookX=Math.sin(time*0.003+cx)*1.5;
    c.fillStyle='#fff';c.beginPath();c.ellipse(cx-5,eyeY,3.5,3.5,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(cx+5,eyeY,3.5,3.5,0,0,Math.PI*2);c.fill();
    c.fillStyle='#1a1a1a';c.beginPath();c.arc(cx-5+lookX,eyeY,1.8,0,Math.PI*2);c.fill();c.beginPath();c.arc(cx+5+lookX,eyeY,1.8,0,Math.PI*2);c.fill();
  }
  // Eyebrows
  c.strokeStyle=hairDark;c.lineWidth=2;c.lineCap='round';
  if(state==='blocking'){
    c.beginPath();c.moveTo(cx-8,eyeY-5);c.lineTo(cx-2,eyeY-3);c.stroke();
    c.beginPath();c.moveTo(cx+2,eyeY-3);c.lineTo(cx+8,eyeY-5);c.stroke();
  }else if(state==='distracted'){
    c.beginPath();c.moveTo(cx-8,eyeY-5);c.lineTo(cx-2,eyeY-5);c.stroke();
    c.beginPath();c.moveTo(cx+2,eyeY-5);c.lineTo(cx+8,eyeY-5);c.stroke();
  }else if(state==='alert'){
    c.beginPath();c.moveTo(cx-8,eyeY-6);c.lineTo(cx-2,eyeY-5);c.stroke();
    c.beginPath();c.moveTo(cx+2,eyeY-5);c.lineTo(cx+8,eyeY-6);c.stroke();
  }else{
    c.beginPath();c.moveTo(cx-8,eyeY-4);c.lineTo(cx-2,eyeY-4);c.stroke();
    c.beginPath();c.moveTo(cx+2,eyeY-4);c.lineTo(cx+8,eyeY-4);c.stroke();
  }
  c.lineCap='butt';
  // Nose
  c.fillStyle='#b07030';c.beginPath();c.ellipse(cx,cy-5,2,3,0,0,Math.PI*2);c.fill();
  // Mouth
  if(state==='eating'){
    c.fillStyle='#cc4444';c.beginPath();c.arc(cx,cy-1,3,0,Math.PI);c.fill();
  }else if(state==='blocking'){
    c.strokeStyle='#1a1a1a';c.lineWidth=1.5;c.beginPath();c.moveTo(cx-4,cy);c.lineTo(cx+4,cy);c.stroke();
  }else{
    c.strokeStyle='#1a1a1a';c.lineWidth=1;c.beginPath();c.arc(cx,cy-1,3,0.2,Math.PI-0.2);c.stroke();
  }
  // Arms
  if(state==='blocking'){
    // Arms crossed / up in front
    c.fillStyle=shirtBase;
    c.save();c.translate(cx-14,cy+10);c.rotate(-0.8);c.fillRect(0,0,6,22);c.restore();
    c.save();c.translate(cx+8,cy+10);c.rotate(0.8);c.fillRect(0,0,6,22);c.restore();
    c.fillStyle='#c68642';
    c.beginPath();c.ellipse(cx-22,cy+2,4,3,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+22,cy+2,4,3,0,0,Math.PI*2);c.fill();
  }else{
    // Arms at sides
    c.fillStyle=shirtBase;
    c.fillRect(cx-17,cy+10,5,18);c.fillRect(cx+12,cy+10,5,18);
    c.fillStyle='#c68642';
    c.beginPath();c.ellipse(cx-15,cy+30,3,3,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+15,cy+30,3,3,0,0,Math.PI*2);c.fill();
  }
  c.restore();
  // Indicator
  if(indicator)drawTextShadow(indicator,cx,cy-30,indicator==='!'?'#FF4444':'#FFAA00','#000',20,'center');
}

  const dadCX=320,dadCY=TABLE_Y-40+Math.sin(dad.bobPhase)*2;

  if(dad.state==='reaching'||dad.state==='eating'||dad.state==='blocked'){

    drawStretchyArm(shoulderX,shoulderY,targetX,targetY,dad.reachProgress||0,dad.state==='blocked');
  }

function renderEffects(){
  const particles=GameEngine.getParticles(),popups=GameEngine.getPopups();
  for(const p of particles){
    c.globalAlpha=p.alpha;c.fillStyle=p.color||'#fff';
    if(p.type==='star'){
      c.save();c.translate(p.x,p.y);c.rotate(p.rotation||0);
      // Glow
      c.globalAlpha=p.alpha*0.5;
      c.shadowColor=p.color||'#FFD700';c.shadowBlur=8;
      const s=p.size/2;
      // 5-point star
      c.beginPath();
      for(let i=0;i<10;i++){
        const r=(i%2===0)?s:s*0.4;
        const a=i*Math.PI/5-Math.PI/2;
        const x=Math.cos(a)*r,y=Math.sin(a)*r;
        if(i===0)c.moveTo(x,y);else c.lineTo(x,y);
      }
      c.closePath();c.fill();
      c.globalAlpha=p.alpha;c.shadowBlur=0;
      c.restore();
    }
    else if(p.type==='heart'){const s=p.size/3;c.beginPath();c.arc(p.x-s/2,p.y,s,0,Math.PI*2);c.arc(p.x+s/2,p.y,s,0,Math.PI*2);c.fill();c.beginPath();c.moveTo(p.x-s*1.2,p.y+s*0.3);c.lineTo(p.x,p.y+s*2);c.lineTo(p.x+s*1.2,p.y+s*0.3);c.fill();}
    else c.fillRect(p.x,p.y,p.size,p.size);
  }
  c.globalAlpha=1;c.shadowBlur=0;
  for(const p of popups){c.save();c.globalAlpha=p.alpha;c.font='bold '+Math.floor(p.size*p.scale)+'px monospace';c.textAlign='center';c.textBaseline='middle';c.fillStyle='#000';c.fillText(p.text,p.x+2,p.y+2);c.fillStyle=p.color;c.fillText(p.text,p.x,p.y);c.restore();}
  c.globalAlpha=1;
}

  if(mode==='1P'){

    drawTextShadow('LEFT CLICK  = Steal CHEESE from Bro 2',W/2,266,'#4a7acc','#000',12,'center');
    drawTextShadow('RIGHT CLICK = Steal SAUSAGE from Bro 1',W/2,284,'#cc4a4a','#000',12,'center');
    drawTextShadow('The kids will try to block you with AI!',W/2,304,'#ffaa44','#000',11,'center');
    drawTextShadow('Steal when they are distracted for best results!',W/2,320,'#aaa','#000',10,'center');
  }else{
    drawTextShadow('DAD (Player 1): Left click=cheese, Right click=sausage',W/2,246,'#ddd','#000',11,'center');
    drawTextShadow('BRO 2 (Player 2): Hold any controller button to block',W/2,268,'#4a7acc','#000',11,'center');
    drawTextShadow('BRO 1 (Player 3): Hold any keyboard key to block',W/2,290,'#cc4a4a','#000',11,'center');
    drawTextShadow('Boys: Hold to block, but watch your stamina!',W/2,312,'#ffaa44','#000',11,'center');
  }

  // Start button (flashing)
  if(Math.floor(time/500)%2===0){
    c.fillStyle=hoverBtn==='start'?'#44aa44':'#228822';
    c.fillRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);
    c.strokeStyle='#66cc66';c.lineWidth=2;c.strokeRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);
    drawTextShadow('START GAME',W/2,BTN_START.y+14,'#fff','#000',20,'center');
  }

  drawTextShadow('Click START or press any button',W/2,400,'#888','#000',12,'center');
  drawTextShadow('5 minute dinner - steal as many slices as you can!',W/2,420,'#aaa','#000',11,'center');
  drawTextShadow('Dad gets a sad salad... time to collect the DAD TAX!',W/2,440,'#FFD700','#000',11,'center');
}

function renderGameOver(time){
  c.fillStyle='rgba(0,0,0,0.7)';c.fillRect(0,0,W,H);
  drawTextShadow('DINNER IS',W/2,60,'#FF6600','#000',32,'center');
  drawTextShadow('OVER!',W/2,100,'#FF6600','#000',32,'center');
  const tm=GameEngine.getTaxMeter(),ch=tm.slices.filter(s=>s==='cheese').length,sa=tm.slices.filter(s=>s==='sausage').length;

  c.fillStyle='rgba(0,0,0,0.4)';c.fillRect(120,145,400,130);
  c.strokeStyle='#FFD700';c.lineWidth=2;c.strokeRect(120,145,400,130);

  drawTextShadow('Dad taxed: '+tm.total+'/'+TOTAL_SLICES+' slices',W/2,155,'#fff','#000',18,'center');
  drawTextShadow('Bro 2 lost: '+ch+' cheese slices',W/2,185,'#4a7acc','#000',16,'center');
  drawTextShadow('Bro 1 lost: '+sa+' sausage slices',W/2,210,'#cc4a4a','#000',16,'center');
  drawTextShadow('Rating:',W/2,245,'#aaa','#000',16,'center');

  drawTextShadow(GameEngine.getRatingLabel(),W/2,275,'#FFD700','#000',28,'center');

  if(Math.floor(time/500)%2===0){
    c.fillStyle=hoverBtn==='start'?'#44aa44':'#228822';
    c.fillRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);
    c.strokeStyle='#66cc66';c.lineWidth=2;c.strokeRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);
    drawTextShadow('PLAY AGAIN',W/2,BTN_START.y+14,'#fff','#000',20,'center');
  }
}

let lastTime=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;
  pollGamepad();
  const state=GameEngine.getState();
  if(state==='PLAYING'){
    const keyBrennanBlocking=GameEngine.getMode()==='3P'?Object.values(keys).some(v=>v):false;
    GameEngine.handleInput(keys,mouseAction,gamepadParkerBlocking,keyBrennanBlocking);
    GameEngine.update(dt);
  }else if(state==='MENU'||state==='GAME_OVER'){
    GameEngine.handleInput(keys,mouseAction,false,false);
  }

  if(state==='MODE_SELECT')renderModeSelect(timestamp);
  else if(state==='MENU')renderTitle(timestamp);
  else if(state==='PLAYING'){renderBackground();renderTable();renderTableItems();renderCharacters(timestamp);renderEffects();renderVignette();renderHUD(timestamp);}
  else if(state==='GAME_OVER'){renderBackground();renderTable();renderTableItems();renderCharacters(timestamp);renderEffects();renderVignette();renderHUD(timestamp);renderGameOver(timestamp);}
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
})();
</script>
</body>
