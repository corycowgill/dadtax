function renderSprite(ctx,spriteData,palette,x,y,scale,flipH){
  if(scale===undefined)scale=2;if(flipH===undefined)flipH=false;
  const h=spriteData.length,w=spriteData[0].length;
  ctx.save();
  if(flipH){ctx.translate(x+w*scale,y);ctx.scale(-1,1);x=0;y=0;}
  for(let row=0;row<h;row++)for(let col=0;col<w;col++){
    const idx=spriteData[row][col];if(idx===0)continue;
    const color=palette[idx];if(!color||color==='transparent')continue;
    ctx.fillStyle=color;ctx.fillRect(x+col*scale,y+row*scale,scale,scale);
  }
  ctx.restore();
}
function renderTile(ctx,tileData,palette,x,y,scale){
  if(scale===undefined)scale=2;
  for(let row=0;row<tileData.length;row++)for(let col=0;col<tileData[row].length;col++){
    const idx=tileData[row][col];if(idx===0)continue;
    const color=palette[idx];if(!color||color==='transparent')continue;
    ctx.fillStyle=color;ctx.fillRect(x+col*scale,y+row*scale,scale,scale);
  }
}
function fillTiles(ctx,tileData,palette,x,y,width,height,scale){
  if(scale===undefined)scale=2;
  const tw=tileData[0].length*scale,th=tileData.length*scale;
  for(let ty=y;ty<y+height;ty+=th)for(let tx=x;tx<x+width;tx+=tw)renderTile(ctx,tileData,palette,tx,ty,scale);
}
function getAnimFrame(frames,time,fps){
  if(fps===undefined)fps=4;if(!frames||frames.length===0)return null;
  return frames[Math.floor(time/(1000/fps))%frames.length];
}

const FPS=60,FRAME=1/FPS,GAME_TIME=5*60,TOTAL_SLICES=8;
const DAD_REACH_FRAMES=25,DAD_EAT_FRAMES=90,DAD_BLOCKED_FRAMES=90,DAD_COOLDOWN_FRAMES=48;
const STAMINA_MAX=100,STAMINA_DRAIN_RATE=2,STAMINA_RECHARGE_RATE=1,STAMINA_EXHAUSTED_THRESHOLD=20;
const RATINGS=[{min:0,max:1,label:"Salad Eater..."},{min:2,max:3,label:"Amateur Taxer"},{min:4,max:5,label:"Sneaky Dad"},{min:6,max:7,label:"Master Taxer!"},{min:8,max:8,label:"TAX KING!!"}];

function rng(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function rngf(min,max){return Math.random()*(max-min)+min;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function createParticle(x,y,type){
  const base={x,y,age:0,maxAge:30,alpha:1};
  switch(type){
    case"crumb":return{...base,vx:rngf(-3,3),vy:rngf(-5,-1),gravity:0.18,size:rng(2,5),color:["#F4A460","#DAA520","#CD853F","#D2691E"][rng(0,3)],maxAge:rng(25,45),type:"crumb"};
    case"star":return{...base,vx:rngf(-4,4),vy:rngf(-4,4),gravity:0,size:rng(3,7),color:"#FFD700",maxAge:rng(15,25),type:"star",rotation:rngf(0,Math.PI*2),rotSpeed:rngf(-0.2,0.2)};
    case"heart":return{...base,vx:rngf(-1,1),vy:rngf(-2,-0.5),gravity:-0.02,size:rng(6,10),color:"#FF6B6B",maxAge:rng(30,50),type:"heart"};
    default:return base;
  }
}
function updateParticle(p){p.age++;p.x+=p.vx;p.y+=p.vy;p.vy+=(p.gravity||0);if(p.rotSpeed)p.rotation+=p.rotSpeed;p.alpha=clamp(1-p.age/p.maxAge,0,1);return p.age<p.maxAge;}
function createPopup(x,y,text,color,size){return{x,y,text,color:color||"#FFF",size:size||16,age:0,maxAge:55,vy:-1.2,alpha:1,scale:0};}
function updatePopup(p){p.age++;p.y+=p.vy;p.vy*=0.97;if(p.age<8)p.scale=Math.min(1.3,p.age/6);else if(p.age<14)p.scale=1.3-(p.age-8)*0.05;else p.scale=1;if(p.age>p.maxAge-15)p.alpha=clamp((p.maxAge-p.age)/15,0,1);return p.age<p.maxAge;}

function createBoy(name,side){
  return{name,side,state:"idle",slices:4,stamina:STAMINA_MAX,staminaExhausted:false,
    blockTimer:0,indicator:"",bobPhase:rngf(0,Math.PI*2)};
}
function updateBoyPlayer(boy,isBlocking){
  boy.bobPhase+=0.05;
  if(boy.staminaExhausted){
    boy.state="idle";boy.indicator="";
    boy.stamina=Math.min(STAMINA_MAX,boy.stamina+STAMINA_RECHARGE_RATE);
    if(boy.stamina>=STAMINA_EXHAUSTED_THRESHOLD)boy.staminaExhausted=false;
    return;
  }
  if(isBlocking&&boy.stamina>0){
    boy.state="blocking";boy.indicator="!";
    boy.stamina=Math.max(0,boy.stamina-STAMINA_DRAIN_RATE);
    if(boy.stamina<=0){boy.staminaExhausted=true;boy.state="idle";boy.indicator="";}
  }else{
    boy.state="idle";boy.indicator="";
    boy.stamina=Math.min(STAMINA_MAX,boy.stamina+STAMINA_RECHARGE_RATE);
  }
}

function createDad(){return{state:"idle",stateTimer:0,target:null,reachProgress:0,bobPhase:0};}
function updateDad(dad,input,boys,particles,popups,taxMeter,audioCallback){
  dad.bobPhase+=0.04;
  switch(dad.state){
    case"idle":if(input.left)startReach(dad,"left");else if(input.right)startReach(dad,"right");break;
    case"reaching":
      dad.stateTimer--;dad.reachProgress=1-dad.stateTimer/DAD_REACH_FRAMES;
      if(dad.stateTimer<=0){
        const targetBoy=dad.target==="left"?boys[0]:boys[1];
        if(targetBoy.state==="blocking"){
          dad.state="blocked";dad.stateTimer=DAD_BLOCKED_FRAMES;dad.reachProgress=1;audioCallback("blocked");
          const px=dad.target==="left"?120:280;for(let i=0;i<6;i++)particles.push(createParticle(px,100,"star"));
          popups.push(createPopup(px,80,"BLOCKED!","#FF4444",20));
        }else if(targetBoy.slices<=0){
          dad.state="blocked";dad.stateTimer=DAD_BLOCKED_FRAMES;popups.push(createPopup(dad.target==="left"?120:280,80,"NO PIZZA!","#888",16));audioCallback("blocked");
        }else{
          targetBoy.slices--;const sliceType=dad.target==="left"?"cheese":"sausage";taxMeter.total++;taxMeter.slices.push(sliceType);
          dad.state="eating";dad.stateTimer=DAD_EAT_FRAMES;dad.reachProgress=1;audioCallback("grab");setTimeout(()=>audioCallback("eat"),300);
          const px=dad.target==="left"?140:260;for(let i=0;i<8;i++)particles.push(createParticle(px,120,"crumb"));
          const label=sliceType==="cheese"?"CHEESE!":"SAUSAGE!";popups.push(createPopup(200,70,"DAD TAX!","#FFD700",24));popups.push(createPopup(px,100,label,"#FFA500",16));
        }
      }break;
    case"eating":dad.stateTimer--;dad.reachProgress=Math.max(0,dad.reachProgress-0.02);if(dad.stateTimer<=0){dad.state="cooldown";dad.stateTimer=DAD_COOLDOWN_FRAMES;dad.reachProgress=0;}break;
    case"blocked":dad.stateTimer--;dad.reachProgress=Math.max(0,dad.reachProgress-0.025);if(dad.stateTimer<=0){dad.state="cooldown";dad.stateTimer=20;dad.reachProgress=0;}break;
    case"cooldown":dad.stateTimer--;dad.reachProgress=0;if(dad.stateTimer<=0){dad.state="idle";dad.stateTimer=0;}break;
  }
}
function startReach(dad,target){dad.state="reaching";dad.target=target;dad.stateTimer=DAD_REACH_FRAMES;dad.reachProgress=0;}

const GameEngine=(function(){
  let gameState="MENU",timer=GAME_TIME,dad,boys,particles,popups,taxMeter,inputState,boyInputState,frameCount,lastRating,gameOverReason;
  function init(){dad=createDad();boys=[createBoy("Parker","left"),createBoy("Brennan","right")];particles=[];popups=[];taxMeter={total:0,slices:[]};inputState={left:false,right:false};boyInputState={parkerBlocking:false,brennanBlocking:false};frameCount=0;timer=GAME_TIME;lastRating="";gameOverReason="";gameState="MENU";}
  function startGame(){dad=createDad();boys=[createBoy("Parker","left"),createBoy("Brennan","right")];particles=[];popups=[];taxMeter={total:0,slices:[]};inputState={left:false,right:false};boyInputState={parkerBlocking:false,brennanBlocking:false};frameCount=0;timer=GAME_TIME;lastRating="";gameOverReason="";gameState="PLAYING";AudioEngine.playMusic();}
  function handleInput(keys,mouse,parkerBlock,brennanBlock){
    if(gameState==="PLAYING"){inputState.left=(mouse&&mouse.left)||false;inputState.right=(mouse&&mouse.right)||false;boyInputState.parkerBlocking=parkerBlock||false;boyInputState.brennanBlocking=brennanBlock||false;}
    if(gameState==="MENU"||gameState==="GAME_OVER"){if(parkerBlock||brennanBlock||(mouse&&(mouse.left||mouse.right)))startGame();}
  }
  function update(dt){
    if(gameState!=="PLAYING")return;frameCount++;timer-=dt;
    if(timer<=0){timer=0;endGame("time");return;}
    if(taxMeter.total>=TOTAL_SLICES){endGame("allEaten");return;}
    const audioFn=type=>AudioEngine.playSFX(type);
    updateDad(dad,inputState,boys,particles,popups,taxMeter,audioFn);
    inputState.left=false;inputState.right=false;
    updateBoyPlayer(boys[0],boyInputState.parkerBlocking);updateBoyPlayer(boys[1],boyInputState.brennanBlocking);
    particles=particles.filter(updateParticle);popups=popups.filter(updatePopup);
  }
  function endGame(reason){gameState="GAME_OVER";gameOverReason=reason;lastRating=getRating(taxMeter.total);AudioEngine.stopMusic();if(taxMeter.total>=6)AudioEngine.playSFX("victory");else AudioEngine.playSFX("game_over");}
  function getRating(count){for(const r of RATINGS)if(count>=r.min&&count<=r.max)return r.label;return"";}
  return{init,update,handleInput,getState:()=>gameState,getDad:()=>dad,getBoys:()=>boys,getParticles:()=>particles,getPopups:()=>popups,getTimer:()=>timer,getTaxMeter:()=>taxMeter,getTaxSlices:()=>taxMeter?taxMeter.slices:[],getRatingLabel:()=>lastRating,getGameOverReason:()=>gameOverReason,startGame,resetGame:()=>{AudioEngine.stopMusic();init();}};
})();

const AudioEngine=(function(){
  let ctx=null,masterGain=null,musicPlaying=false,musicInterval=null;
  function init(){if(ctx)return;ctx=new(window.AudioContext||window.webkitAudioContext)();masterGain=ctx.createGain();masterGain.gain.value=0.35;masterGain.connect(ctx.destination);}
  function ensureCtx(){if(!ctx)init();if(ctx.state==="suspended")ctx.resume();}
  function playTone(freq,type,duration,volume,startTime){if(!ctx)return;const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(volume,startTime);gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);osc.connect(gain);gain.connect(masterGain);osc.start(startTime);osc.stop(startTime+duration);}
  function playNoise(duration,volume,startTime){if(!ctx)return;const bufferSize=ctx.sampleRate*duration;const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);const data=buffer.getChannelData(0);for(let i=0;i<bufferSize;i++)data[i]=Math.random()*2-1;const src=ctx.createBufferSource();src.buffer=buffer;const gain=ctx.createGain();gain.gain.setValueAtTime(volume,startTime);gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);src.connect(gain);gain.connect(masterGain);src.start(startTime);src.stop(startTime+duration);}
  const N={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,Bb3:233.08,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,B4:493.88,C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,R:0};
  const TEMPO=160,EIGHTH=60/TEMPO/2;
  const melodyA=[N.A4,N.B4,N.C5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.C5,N.D5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.A4,N.R,N.A4,N.C5,N.D5,N.E5,N.G5,N.E5,N.D5,N.C5,N.D5,N.E5,N.C5,N.B4,N.A4,N.B4,N.C5,N.D5,N.C5,N.B4,N.A4,N.G4,N.F4,N.E4,N.A4,N.R,N.A4];
  const melodyB=[N.C5,N.E5,N.G5,N.E5,N.C5,N.E5,N.D5,N.F5,N.A5,N.F5,N.D5,N.F5,N.E5,N.D5,N.C5,N.B4,N.A4,N.G4,N.A4,N.B4,N.C5,N.D5,N.E5,N.D5,N.C5,N.C5,N.E5,N.E5,N.G5,N.G5,N.A5,N.G5,N.E5,N.C5,N.D5,N.E5,N.F5,N.E5,N.D5,N.C5,N.B4,N.A4,N.A4,N.C5,N.E5,N.A4,N.R,N.R];
  const fullMelody=melodyA.concat(melodyB);
  const bassPattern=[N.A3,N.E3,N.A3,N.E3,N.D3,N.A3,N.G3,N.E3,N.A3,N.E3,N.C4,N.G3,N.D3,N.E3,N.A3,N.A3,N.C3,N.G3,N.D3,N.A3,N.E3,N.G3,N.A3,N.E3,N.C3,N.E3,N.G3,N.C3,N.F3,N.E3,N.A3,N.A3];
  let melodyIndex=0,bassIndex=0,eigthCount=0;
  function scheduleMusic(){
    if(!ctx||!musicPlaying)return;const now=ctx.currentTime;const noteTime=EIGHTH;
    const mNote=fullMelody[melodyIndex%fullMelody.length];if(mNote>0)playTone(mNote,"square",noteTime*0.85,0.13,now);melodyIndex++;
    if(eigthCount%3===0){const bNote=bassPattern[bassIndex%bassPattern.length];if(bNote>0)playTone(bNote,"triangle",noteTime*3*0.9,0.18,now);bassIndex++;}
    const beatInBar=eigthCount%6;
    if(beatInBar===0)playTone(60,"triangle",0.08,0.2,now);else if(beatInBar===3)playTone(55,"triangle",0.06,0.15,now);
    if(beatInBar===0||beatInBar===2||beatInBar===3||beatInBar===5)playNoise(0.04,0.06,now);
    if(beatInBar===1||beatInBar===4){playNoise(0.07,0.09,now);playTone(180,"square",0.03,0.05,now);}
    eigthCount++;
  }
  function playMusic(){ensureCtx();if(musicPlaying)return;musicPlaying=true;melodyIndex=0;bassIndex=0;eigthCount=0;musicInterval=setInterval(scheduleMusic,EIGHTH*1000);}
  function stopMusic(){musicPlaying=false;if(musicInterval){clearInterval(musicInterval);musicInterval=null;}}
  function playSFX(type){
    ensureCtx();const now=ctx.currentTime;
    switch(type){
      case"grab":playTone(440,"square",0.08,0.15,now);playTone(554,"square",0.08,0.15,now+0.07);playTone(659,"square",0.08,0.15,now+0.14);playTone(880,"square",0.12,0.18,now+0.21);break;
      case"eat":for(let i=0;i<4;i++){const t=now+i*0.12;playNoise(0.06,0.12,t);playTone(120+i*30,"sawtooth",0.04,0.06,t);}break;
      case"blocked":playTone(300,"sawtooth",0.12,0.15,now);playTone(200,"sawtooth",0.12,0.15,now+0.1);playTone(120,"sawtooth",0.18,0.12,now+0.2);playNoise(0.15,0.1,now+0.05);break;
      case"alert":playTone(880,"square",0.06,0.12,now);playTone(1100,"square",0.06,0.12,now+0.08);break;
      case"game_over":playTone(440,"triangle",0.3,0.15,now);playTone(392,"triangle",0.3,0.15,now+0.3);playTone(330,"triangle",0.3,0.15,now+0.6);playTone(262,"triangle",0.5,0.12,now+0.9);break;
      case"victory":playTone(523,"square",0.15,0.15,now);playTone(659,"square",0.15,0.15,now+0.15);playTone(784,"square",0.15,0.15,now+0.3);playTone(1047,"square",0.3,0.18,now+0.45);playTone(392,"triangle",0.15,0.1,now+0.15);playTone(523,"triangle",0.15,0.1,now+0.3);playTone(659,"triangle",0.3,0.12,now+0.45);for(let i=0;i<5;i++)playNoise(0.04,0.06,now+0.5+i*0.08);break;
    }
  }
  return{init,playMusic,stopMusic,playSFX};
})();

(function(){
const canvas = document.getElementById('game');
const c = canvas.getContext('2d');
const W = 320, H = 240;
canvas.width = W; canvas.height = H;

function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/W, vh/H);
  canvas.style.width = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}
window.addEventListener('resize', resize); resize();

// Input
const keys = {};
let mouseAction = {left:false, right:false};
let gamepadParkerBlocking = false;
let audioStarted = false;
function ensureAudio(){if(!audioStarted){AudioEngine.init();audioStarted=true;}}

function pollGamepad(){
  gamepadParkerBlocking=false;
  const gamepads=navigator.getGamepads?navigator.getGamepads():[];
  for(const gp of gamepads){
    if(!gp)continue;
    for(const btn of gp.buttons){if(btn.pressed||btn.value>0.5){gamepadParkerBlocking=true;return;}}
  }
}

document.addEventListener('keydown', e=>{
  ensureAudio(); keys[e.code]=true;
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
});
document.addEventListener('keyup', e=>{keys[e.code]=false;});

function getLogicalPos(cx,cy){
  const rect=canvas.getBoundingClientRect();
  return{x:(cx-rect.left)/rect.width*W, y:(cy-rect.top)/rect.height*H};
}

const BTN_LEFT={x:20,y:218,w:100,h:20};
const BTN_RIGHT={x:200,y:218,w:100,h:20};
const BTN_START={x:95,y:170,w:130,h:24};
function hitTest(pos,btn){return pos.x>=btn.x&&pos.x<=btn.x+btn.w&&pos.y>=btn.y&&pos.y<=btn.y+btn.h;}

canvas.addEventListener('mousedown',e=>{
  ensureAudio();if(e.button===0)mouseAction.left=true;if(e.button===2)mouseAction.right=true;
});
canvas.addEventListener('mouseup',e=>{if(e.button===0)mouseAction.left=false;if(e.button===2)mouseAction.right=false;});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();
  for(const t of e.changedTouches){const pos=getLogicalPos(t.clientX,t.clientY);const state=GameEngine.getState();
    if(state==="PLAYING"){if(hitTest(pos,BTN_LEFT))mouseAction.left=true;else if(hitTest(pos,BTN_RIGHT))mouseAction.right=true;}
    else{if(hitTest(pos,BTN_START))keys["Enter"]=true;}}
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();mouseAction.left=false;mouseAction.right=false;setTimeout(()=>{keys["Enter"]=false;},50);},{passive:false});

let hoverBtn=null;
canvas.addEventListener('mousemove',e=>{
  const pos=getLogicalPos(e.clientX,e.clientY);const state=GameEngine.getState();
  if(state==="PLAYING"){hoverBtn=hitTest(pos,BTN_LEFT)?'left':hitTest(pos,BTN_RIGHT)?'right':null;}
  else{hoverBtn=hitTest(pos,BTN_START)?'start':null;}
});

function drawText(text,x,y,color,size,align){c.save();c.font=(size||8)+'px monospace';c.fillStyle=color||'#fff';c.textAlign=align||'left';c.textBaseline='top';c.fillText(text,x,y);c.restore();}
function drawTextShadow(text,x,y,color,shadow,size,align){drawText(text,x+1,y+1,shadow||'#000',size,align);drawText(text,x,y,color,size,align);}

const TABLE_Y=90,TABLE_H=80,TABLE_X=40,TABLE_W=240,FLOOR_Y=TABLE_Y+TABLE_H;

function renderBackground(){
  fillTiles(c,TILES.wall,PALETTES.wall,0,0,W,TABLE_Y,1);
  fillTiles(c,TILES.floor,PALETTES.floor,0,FLOOR_Y,W,H-FLOOR_Y,1);

  fillTiles(c,TILES.tableWood,PALETTES.table,TABLE_X,TABLE_Y,TABLE_W,TABLE_H,1);

    else for(let i=0;i<boys[1].slices;i++)renderSprite(c,ITEM_SPRITES.sausagePizzaSlice,PALETTES.pizza,212+i*10,TABLE_Y+12,1);
  }
  // Dad's sad salad (center)
  renderSprite(c,ITEM_SPRITES.sadSalad,PALETTES.salad,150,TABLE_Y+6,1);

function drawStretchyArm(startX,startY,endX,endY,progress,blocked){
  // Cartoonishly long stretchy arm reaching across the table!
  const curX=startX+(endX-startX)*progress;
  const curY=startY+(endY-startY)*progress;

  // Arm wobble for comedic effect
  const wobble=Math.sin(performance.now()*0.012)*2*progress;
  const wobble2=Math.cos(performance.now()*0.009)*1.5*progress;

  // Draw the stretchy arm as segmented sausage-link sections
  const segments=Math.max(4,Math.floor(progress*14));
  for(let i=0;i<=segments;i++){
    const t=i/segments;
    const sx=startX+(curX-startX)*t;
    const sy=startY+(curY-startY)*t;
    // Wavy motion along the arm
    const wave=Math.sin(t*Math.PI*3+performance.now()*0.008)*wobble;
    const px=sx+wave;
    const py=sy+wobble2*Math.sin(t*Math.PI);
    // Arm gets slightly thinner toward the hand
    const thickness=5-t*1.5;
    // Arm color with shading
    c.fillStyle=(i%2===0)?'#dea96e':'#c68642';
    c.beginPath();
    c.ellipse(px,py,thickness,thickness*0.7,0,0,Math.PI*2);
    c.fill();
    // Outline
    c.strokeStyle='#6b4226';
    c.lineWidth=0.5;
    c.stroke();
    // Sleeve at shoulder end
    if(i<2){
      c.fillStyle='#2d7a2d';
      c.beginPath();
      c.ellipse(px,py,thickness+1,thickness*0.8,0,0,Math.PI*2);
      c.fill();
    }
  }

  // Draw the hand at the end
  const handX=curX+wobble*0.5;
  const handY=curY+wobble2*0.3;

  if(blocked){
    // Stinging hand with stars
    c.fillStyle='#dea96e';
    c.beginPath();c.ellipse(handX,handY,5,4,0.3,0,Math.PI*2);c.fill();
    c.strokeStyle='#6b4226';c.lineWidth=0.5;c.stroke();
    // Red sting marks
    c.fillStyle='#ff4444';
    c.beginPath();c.arc(handX-2,handY-3,1.5,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(handX+3,handY-1,1.5,0,Math.PI*2);c.fill();
    // Cartoon stars around hand
    const starT=performance.now()*0.005;
    for(let s=0;s<4;s++){
      const a=starT+s*Math.PI/2;
      const sx2=handX+Math.cos(a)*10;
      const sy2=handY+Math.sin(a)*8;
      drawTextShadow('*',sx2-3,sy2-3,'#FFD700','#000',7,'center');
    }
  } else {
    // Grabby open hand
    c.fillStyle='#dea96e';
    // Palm
    c.beginPath();c.ellipse(handX,handY,5,4.5,0,0,Math.PI*2);c.fill();
    c.strokeStyle='#6b4226';c.lineWidth=0.5;c.stroke();
    // Fingers spread out (grabbing motion)
    const fingerWiggle=Math.sin(performance.now()*0.015)*0.2;
    const fingers=[[-4,-5],[-1,-6],[2,-5.5],[4.5,-4],[5,0]];
    for(const[fx,fy] of fingers){
      c.fillStyle='#dea96e';
      c.beginPath();
      c.ellipse(handX+fx,handY+fy+fingerWiggle*fx,1.5,2.5,fx*0.1,0,Math.PI*2);
      c.fill();
      c.strokeStyle='#6b4226';c.lineWidth=0.4;c.stroke();
    }
    // If almost reached, show pizza in hand during eating
    if(progress>=1){
      c.fillStyle='#f0c040';
      c.beginPath();
      c.moveTo(handX,handY-8);c.lineTo(handX-5,handY-1);c.lineTo(handX+5,handY-1);
      c.closePath();c.fill();
      c.strokeStyle='#aa7a30';c.lineWidth=0.5;c.stroke();
    }
  }
}

function renderCharacters(time){
  const dad=GameEngine.getDad(),boys=GameEngine.getBoys();
  // Dad (top center)
  const dadX=144,dadY=TABLE_Y-42+Math.sin(dad.bobPhase)*1;
  let dadFrames,dadFlip=false;
  if(dad.state==='eating')dadFrames=SPRITES.dad.eating;
  else if(dad.state==='reaching'){dadFrames=SPRITES.dad.reachRight;if(dad.target==='left')dadFlip=true;}
  else if(dad.state==='blocked')dadFrames=SPRITES.dad.blocked;
  else dadFrames=SPRITES.dad.idle;
  const df=getAnimFrame(dadFrames,time,dad.state==='eating'?6:4);
  if(df)renderSprite(c,df,PALETTES.dad,dadX,dadY,1,dadFlip);

  // Draw the stretchy arm when reaching, eating, or blocked
  if(dad.state==='reaching'||dad.state==='eating'||dad.state==='blocked'){
    // Dad's shoulder position
    const shoulderX=dadX+16;
    const shoulderY=dadY+26;
    // Target pizza position
    const targetX=dad.target==='left'?72:222;
    const targetY=TABLE_Y+16;
    const prog=dad.reachProgress||0;
    drawStretchyArm(shoulderX,shoulderY,targetX,targetY,prog,dad.state==='blocked');
  }

  // Parker (left-bottom)
  const pk=boys[0],pkX=50,pkY=FLOOR_Y-6+Math.sin(pk.bobPhase)*1;
  let pkState=pk.state==='eating_own'?'eating':pk.state;
  const pkF=getAnimFrame(SPRITES.parker[pkState]||SPRITES.parker.idle,time,4);
  if(pkF)renderSprite(c,pkF,PALETTES.parker,pkX,pkY,1);
  if(pk.indicator)drawTextShadow(pk.indicator,pkX+16,pkY-10,pk.indicator==='!'?'#FF4444':'#FFAA00','#000',10,'center');

  // Brennan (right-bottom)
  const br=boys[1],brX=230,brY=FLOOR_Y-8+Math.sin(br.bobPhase)*1;
  let brState=br.state==='eating_own'?'eating':br.state;
  const brF=getAnimFrame(SPRITES.brennan[brState]||SPRITES.brennan.idle,time,4);
  if(brF)renderSprite(c,brF,PALETTES.brennan,brX,brY,1);
  if(br.indicator)drawTextShadow(br.indicator,brX+16,brY-10,br.indicator==='!'?'#FF4444':'#FFAA00','#000',10,'center');
}

function renderEffects(){
  const particles=GameEngine.getParticles(),popups=GameEngine.getPopups();
  for(const p of particles){
    c.globalAlpha=p.alpha;c.fillStyle=p.color||'#fff';
    if(p.type==='star'){c.save();c.translate(p.x,p.y);c.rotate(p.rotation||0);const s=p.size/2;c.beginPath();c.moveTo(0,-s);c.lineTo(s/2,0);c.lineTo(0,s);c.lineTo(-s/2,0);c.closePath();c.fill();c.restore();}
    else if(p.type==='heart'){const s=p.size/3;c.beginPath();c.arc(p.x-s/2,p.y,s,0,Math.PI*2);c.arc(p.x+s/2,p.y,s,0,Math.PI*2);c.fill();c.beginPath();c.moveTo(p.x-s*1.2,p.y+s*0.3);c.lineTo(p.x,p.y+s*2);c.lineTo(p.x+s*1.2,p.y+s*0.3);c.fill();}
    else c.fillRect(p.x,p.y,p.size,p.size);
  }
  c.globalAlpha=1;
  for(const p of popups){c.save();c.globalAlpha=p.alpha;c.font=Math.floor(p.size*p.scale)+'px monospace';c.textAlign='center';c.textBaseline='middle';c.fillStyle='#000';c.fillText(p.text,p.x+1,p.y+1);c.fillStyle=p.color;c.fillText(p.text,p.x,p.y);c.restore();}
  c.globalAlpha=1;
}

function renderHUD(time){
  const timer=GameEngine.getTimer(),taxMeter=GameEngine.getTaxMeter();
  const mins=Math.floor(timer/60),secs=Math.floor(timer%60);
  const ts=(mins<10?'0':'')+mins+':'+(secs<10?'0':'')+secs;
  drawTextShadow('DINNER TIME',4,2,'#FFD700','#000',7);
  drawTextShadow(ts,4,12,timer<30?(Math.floor(time/300)%2===0?'#FF2222':'#FFAAAA'):'#FFFFFF','#000',10);

  // Tax meter (right side)
  drawTextShadow('TAX',296,2,'#FFD700','#000',7,'center');
  const mX=290,mY=12,mW=12,mH=70;
  c.fillStyle='#111';c.fillRect(mX,mY,mW,mH);c.strokeStyle='#FFD700';c.lineWidth=1;c.strokeRect(mX,mY,mW,mH);
  const fillH=(taxMeter.total/TOTAL_SLICES)*mH;
  if(fillH>0){const g=c.createLinearGradient(0,mY+mH-fillH,0,mY+mH);g.addColorStop(0,'#FFD700');g.addColorStop(1,'#FF6600');c.fillStyle=g;c.fillRect(mX+1,mY+mH-fillH,mW-2,fillH);}
  for(let i=0;i<taxMeter.total;i++){const sy=mY+mH-8-i*8;c.fillStyle=taxMeter.slices[i]==='cheese'?'#f0c040':'#6a3a1a';c.beginPath();c.moveTo(mX+6,sy);c.lineTo(mX+2,sy+6);c.lineTo(mX+10,sy+6);c.closePath();c.fill();}

  // Buttons
  c.fillStyle=hoverBtn==='left'?'#3366cc':'#224488';c.fillRect(BTN_LEFT.x,BTN_LEFT.y,BTN_LEFT.w,BTN_LEFT.h);
  c.strokeStyle='#6688cc';c.lineWidth=1;c.strokeRect(BTN_LEFT.x,BTN_LEFT.y,BTN_LEFT.w,BTN_LEFT.h);
  drawTextShadow('< CHEESE (L)',BTN_LEFT.x+BTN_LEFT.w/2,BTN_LEFT.y+5,'#fff','#000',8,'center');
  c.fillStyle=hoverBtn==='right'?'#cc3333':'#882222';c.fillRect(BTN_RIGHT.x,BTN_RIGHT.y,BTN_RIGHT.w,BTN_RIGHT.h);
  c.strokeStyle='#cc6666';c.lineWidth=1;c.strokeRect(BTN_RIGHT.x,BTN_RIGHT.y,BTN_RIGHT.w,BTN_RIGHT.h);
  drawTextShadow('SAUSAGE (R) >',BTN_RIGHT.x+BTN_RIGHT.w/2,BTN_RIGHT.y+5,'#fff','#000',8,'center');
  drawTextShadow(taxMeter.total+'/'+TOTAL_SLICES+' TAXED',W/2,208,'#FFD700','#000',8,'center');

  drawTextShadow('PARKER',66,FLOOR_Y-16,'#4a7acc','#000',6,'center');
  drawTextShadow('BRENNAN',246,FLOOR_Y-16,'#cc4a4a','#000',6,'center');

  // Stamina bars
  const stBoys=GameEngine.getBoys();
  const psX=36,psY=FLOOR_Y-8,psW=60,psH=4;
  c.fillStyle='#111';c.fillRect(psX,psY,psW,psH);
  const psFill=stBoys[0].stamina/STAMINA_MAX;
  c.fillStyle=stBoys[0].staminaExhausted?'#ff2222':psFill>0.3?'#44cc44':'#ff8800';
  c.fillRect(psX,psY,psW*psFill,psH);
  c.strokeStyle='#888';c.lineWidth=0.5;c.strokeRect(psX,psY,psW,psH);
  if(stBoys[0].staminaExhausted)drawTextShadow('TIRED!',66,FLOOR_Y-24,'#FF2222','#000',7,'center');

  const bsX=216,bsY=FLOOR_Y-8,bsW=60,bsH=4;
  c.fillStyle='#111';c.fillRect(bsX,bsY,bsW,bsH);
  const bsFill=stBoys[1].stamina/STAMINA_MAX;
  c.fillStyle=stBoys[1].staminaExhausted?'#ff2222':bsFill>0.3?'#44cc44':'#ff8800';
  c.fillRect(bsX,bsY,bsW*bsFill,bsH);
  c.strokeStyle='#888';c.lineWidth=0.5;c.strokeRect(bsX,bsY,bsW,bsH);
  if(stBoys[1].staminaExhausted)drawTextShadow('TIRED!',246,FLOOR_Y-24,'#FF2222','#000',7,'center');
}

function renderTitle(time){
  c.fillStyle='#1a0a2e';c.fillRect(0,0,W,H);
  for(let i=0;i<W;i+=8)for(let j=0;j<3;j++){c.fillStyle=((i/8+j)%2===0)?'#cc2222':'#ffffff';c.fillRect(i,j*8,8,8);c.fillRect(i,H-24+j*8,8,8);}
  for(let j=24;j<H-24;j+=8)for(let i=0;i<3;i++){c.fillStyle=((j/8+i)%2===0)?'#cc2222':'#ffffff';c.fillRect(i*8,j,8,8);c.fillRect(W-24+i*8,j,8,8);}
  drawTextShadow('DAD TAX',W/2,34,'#FFD700','#4a2a00',24,'center');
  drawTextShadow('ATTACK!',W/2,60,'#FF6600','#4a1a00',24,'center');
  drawTextShadow('3 PLAYER LOCAL MULTIPLAYER!',W/2,86,'#44ffaa','#003322',7,'center');
  renderSprite(c,ITEM_SPRITES.cheesePizzaWhole,PALETTES.pizza,50,98,1);
  renderSprite(c,ITEM_SPRITES.sausagePizzaWhole,PALETTES.pizza,246,98,1);
  renderSprite(c,ITEM_SPRITES.sadSalad,PALETTES.salad,150,102,1);
  drawTextShadow('DAD: Mouse (L=cheese R=sausage)',W/2,128,'#ddd','#000',6,'center');
  drawTextShadow('PARKER: Controller (hold to block)',W/2,140,'#4a7acc','#000',6,'center');
  drawTextShadow('BRENNAN: Keyboard (hold key to block)',W/2,152,'#cc4a4a','#000',6,'center');
  if(Math.floor(time/500)%2===0){c.fillStyle=hoverBtn==='start'?'#44aa44':'#228822';c.fillRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);c.strokeStyle='#66cc66';c.lineWidth=1;c.strokeRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);drawTextShadow('START GAME',W/2,BTN_START.y+7,'#fff','#000',10,'center');}
  drawTextShadow('Space / Enter / Click / Button',W/2,200,'#888','#000',6,'center');
}

function renderGameOver(time){
  c.fillStyle='rgba(0,0,0,0.65)';c.fillRect(0,0,W,H);
  drawTextShadow('DINNER IS',W/2,30,'#FF6600','#000',18,'center');
  drawTextShadow('OVER!',W/2,52,'#FF6600','#000',18,'center');
  const tm=GameEngine.getTaxMeter(),ch=tm.slices.filter(s=>s==='cheese').length,sa=tm.slices.filter(s=>s==='sausage').length;
  drawTextShadow('Dad taxed: '+tm.total+'/'+TOTAL_SLICES+' slices',W/2,82,'#fff','#000',9,'center');
  drawTextShadow('Parker lost: '+ch+' slices',W/2,97,'#4a7acc','#000',8,'center');
  drawTextShadow('Brennan lost: '+sa+' slices',W/2,110,'#cc4a4a','#000',8,'center');
  drawTextShadow('Rating:',W/2,128,'#aaa','#000',8,'center');
  drawTextShadow(GameEngine.getRatingLabel(),W/2,142,'#FFD700','#000',14,'center');
  if(Math.floor(time/500)%2===0){c.fillStyle=hoverBtn==='start'?'#44aa44':'#228822';c.fillRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);c.strokeStyle='#66cc66';c.lineWidth=1;c.strokeRect(BTN_START.x,BTN_START.y,BTN_START.w,BTN_START.h);drawTextShadow('PLAY AGAIN',W/2,BTN_START.y+7,'#fff','#000',10,'center');}
}

let lastTime=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;
  pollGamepad();const keyBrennanBlocking=Object.values(keys).some(v=>v);GameEngine.handleInput(keys,mouseAction,gamepadParkerBlocking,keyBrennanBlocking);GameEngine.update(dt);
  const state=GameEngine.getState();
  if(state==='MENU')renderTitle(timestamp);
  else if(state==='PLAYING'){renderBackground();renderTable();renderTableItems();renderCharacters(timestamp);renderEffects();renderHUD(timestamp);}
  else if(state==='GAME_OVER'){renderBackground();renderTable();renderTableItems();renderCharacters(timestamp);renderEffects();renderHUD(timestamp);renderGameOver(timestamp);}
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
})();
</script>
